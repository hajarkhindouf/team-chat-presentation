name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "develop"]

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test:integration

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test:e2e

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage

  docker-build:
    name: Docker build (backend & frontend)
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build --target runtime -t chat-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t chat-frontend:ci ./frontend
      - name: Smoke test backend container
        run: |
          docker run -d --name backend-smoke -p 3000:3000 chat-backend:ci
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Backend is healthy"; exit 0
            fi
            sleep 2
          done
          echo "Backend failed to become healthy"; docker logs backend-smoke; exit 1
      - name: Cleanup
        if: always()
        run: docker rm -f backend-smoke || true
