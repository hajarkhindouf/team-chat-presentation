name: CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend   # ← Important : on se place dans backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json   # ← Spécifie le chemin exact

      - name: Install dependencies
        run: npm install

      - name: Run lint (si vous avez ESLint configuré)
        run: npm run lint || echo "No lint script"

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage (optionnel)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./backend/coverage/

  # Si vous avez aussi des tests pour le frontend (ex: React), ajoutez un job similaire pour frontend