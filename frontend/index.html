<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>General — Team3 Chat</title>
<style>
  :root{
    --bg: #12141a;
    --panel: #1a1d26;
    --panel-2: #20232e;
    --accent: #5b8cff;
    --accent-2: #ff8a5b;
    --text: #e8e9ee;
    --text-dim: #8b8f9c;
    --border: #2a2e3a;
    --radius: 10px;
    font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    height:100vh;
    display:flex;
    flex-direction:column;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 14px 22px;
    border-bottom:1px solid var(--border);
    background: var(--panel);
  }
  header .chan{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    font-size:1.05rem;
  }
  header .chan .hash{
    color: var(--accent);
    font-size:1.3rem;
  }
  header .controls{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:0.85rem;
    color: var(--text-dim);
  }
  header button{
    background: var(--panel-2);
    border:1px solid var(--border);
    color: var(--text);
    padding:7px 14px;
    border-radius: var(--radius);
    cursor:pointer;
    font-size:0.85rem;
    display:flex;
    align-items:center;
    gap:6px;
  }
  header button:hover{ border-color: var(--accent); }
  .toggle{
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    user-select:none;
  }
  #messages{
    flex:1;
    overflow-y:auto;
    padding: 20px 22px;
    display:flex;
    flex-direction:column;
    gap: 14px;
  }
  .msg{
    display:flex;
    gap:12px;
    max-width: 720px;
  }
  .msg img{
    width:38px;
    height:38px;
    border-radius:50%;
    flex-shrink:0;
    background: var(--panel-2);
  }
  .msg .body{
    display:flex;
    flex-direction:column;
    gap:3px;
  }
  .msg .meta{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .msg .author{
    font-weight:600;
    font-size:0.92rem;
  }
  .msg .time{
    font-size:0.72rem;
    color: var(--text-dim);
  }
  .msg .content{
    background: var(--panel);
    border:1px solid var(--border);
    padding:9px 13px;
    border-radius: var(--radius);
    font-size:0.92rem;
    line-height:1.4;
    word-break:break-word;
  }
  .msg .delete-btn{
    background:none;
    border:none;
    color: var(--text-dim);
    font-size:0.7rem;
    cursor:pointer;
    align-self:flex-start;
    opacity:0;
    transition:opacity .15s;
  }
  .msg:hover .delete-btn{ opacity:1; }
  .msg .delete-btn:hover{ color: var(--accent-2); }

  .poll-card{
    background: var(--panel-2);
    border:1px solid var(--border);
    border-radius: var(--radius);
    padding:12px 14px;
    max-width:320px;
  }
  .poll-card h4{ margin:0 0 8px; font-size:0.9rem; }
  .poll-option{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
    font-size:0.82rem;
  }
  .poll-option button{
    background: var(--bg);
    border:1px solid var(--border);
    color: var(--text);
    border-radius:6px;
    padding:5px 9px;
    cursor:pointer;
    flex:1;
    text-align:left;
    position:relative;
    overflow:hidden;
  }
  .poll-option button:hover{ border-color: var(--accent); }
  .poll-bar{
    position:absolute;
    left:0; top:0; bottom:0;
    background: rgba(91,140,255,0.18);
    z-index:0;
  }
  .poll-option button span{ position:relative; z-index:1; }
  .poll-votes{ color: var(--text-dim); width:34px; text-align:right; }

  #composer{
    border-top:1px solid var(--border);
    background: var(--panel);
    padding: 14px 22px;
    display:flex;
    gap:10px;
  }
  #composer input[type=text]{
    flex:1;
    background: var(--panel-2);
    border:1px solid var(--border);
    color: var(--text);
    padding:10px 14px;
    border-radius: var(--radius);
    font-size:0.92rem;
  }
  #composer input[type=text]:focus{ outline:none; border-color: var(--accent); }
  #composer button{
    background: var(--accent);
    border:none;
    color:white;
    padding:10px 18px;
    border-radius: var(--radius);
    cursor:pointer;
    font-weight:600;
  }
  #composer button:hover{ opacity:0.9; }
  #composer .poll-btn{
    background: var(--panel-2);
    border:1px solid var(--border);
    color: var(--text);
  }
  #usernameBar{
    padding:8px 22px;
    background:#0e1015;
    font-size:0.78rem;
    color: var(--text-dim);
    display:flex;
    align-items:center;
    gap:8px;
  }
  #usernameBar input{
    background: var(--panel-2);
    border:1px solid var(--border);
    color: var(--text);
    padding:4px 8px;
    border-radius:6px;
    font-size:0.78rem;
    width:140px;
  }
  #status{ font-size:0.72rem; color: var(--text-dim); }
  .modal-backdrop{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:10;
  }
  .modal-backdrop.open{ display:flex; }
  .modal{
    background: var(--panel);
    border:1px solid var(--border);
    border-radius: var(--radius);
    padding:20px;
    width:340px;
  }
  .modal h3{ margin-top:0; }
  .modal input{
    width:100%;
    background: var(--panel-2);
    border:1px solid var(--border);
    color: var(--text);
    padding:8px 10px;
    border-radius:6px;
    margin-bottom:8px;
    font-size:0.85rem;
  }
  .modal .actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:10px; }
  .modal .actions button{
    padding:7px 14px;
    border-radius:6px;
    border:1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    cursor:pointer;
  }
  .modal .actions .primary{ background: var(--accent); border:none; color:white; }
</style>
</head>
<body>

<div id="usernameBar">
  👤 Connecté en tant que <input id="usernameInput" type="text" value="" />
  <span id="status"></span>
</div>

<header>
  <div class="chan"><span class="hash">#</span> General</div>
  <div class="controls">
    <label class="toggle">
      <input type="checkbox" id="autoRefreshToggle" checked />
      Auto-refresh (5s)
    </label>
    <button id="refreshBtn">🔄 Refresh</button>
  </div>
</header>

<div id="messages"></div>

<div id="composer">
  <input type="text" id="messageInput" placeholder="Écrire un message dans #General…" maxlength="2000" />
  <button class="poll-btn" id="pollBtn">📊 Sondage</button>
  <button id="sendBtn">Envoyer</button>
</div>

<div class="modal-backdrop" id="pollModal">
  <div class="modal">
    <h3>Créer un sondage</h3>
    <input type="text" id="pollQuestion" placeholder="Question" />
    <div id="pollOptionsWrap"></div>
    <button class="actions" id="addOptionBtn" style="width:100%;margin-bottom:8px;">+ Ajouter une option</button>
    <div class="actions">
      <button id="cancelPoll">Annuler</button>
      <button class="primary" id="createPoll">Créer</button>
    </div>
  </div>
</div>

<script>
const API_BASE = window.CHAT_API_BASE || '/api';
const messagesEl = document.getElementById('messages');
const usernameInput = document.getElementById('usernameInput');
const statusEl = document.getElementById('status');

usernameInput.value = localStorage.getItem('chat_username') || 'User' + Math.floor(Math.random()*1000);
usernameInput.addEventListener('change', () => localStorage.setItem('chat_username', usernameInput.value));

function currentUser(){ return usernameInput.value.trim() || 'Anonyme'; }

function avatarFor(name){
  return `https://ui-avatars.com/api/?background=random&name=${encodeURIComponent(name)}`;
}

function formatTime(iso){
  const d = new Date(iso);
  return d.toLocaleString(undefined, { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

async function fetchMessages(){
  statusEl.textContent = 'Chargement…';
  try{
    const res = await fetch(`${API_BASE}/chat/messages?limit=50&offset=0`);
    const json = await res.json();
    render(json.data.slice().reverse()); // oldest first for display
    statusEl.textContent = `Mis à jour à ${new Date().toLocaleTimeString()}`;
  }catch(e){
    statusEl.textContent = 'Erreur de connexion à l\'API';
  }
}

function render(messages){
  messagesEl.innerHTML = '';
  for(const m of messages){
    const row = document.createElement('div');
    row.className = 'msg';

    const img = document.createElement('img');
    img.src = m.author_avatar || avatarFor(m.author_name);

    const body = document.createElement('div');
    body.className = 'body';

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = `<span class="author">${escapeHtml(m.author_name)}</span><span class="time">${formatTime(m.created_at)}</span>`;

    const content = document.createElement('div');
    content.className = 'content';
    content.textContent = m.content;

    body.appendChild(meta);
    body.appendChild(content);

    if(m.author_name === currentUser()){
      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = 'Supprimer';
      del.onclick = () => deleteMessage(m.id);
      body.appendChild(del);
    }

    row.appendChild(img);
    row.appendChild(body);
    messagesEl.appendChild(row);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function sendMessage(){
  const input = document.getElementById('messageInput');
  const content = input.value.trim();
  if(!content) return;
  await fetch(`${API_BASE}/chat/messages`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ authorName: currentUser(), content })
  });
  input.value = '';
  fetchMessages();
}

async function deleteMessage(id){
  await fetch(`${API_BASE}/chat/messages/${id}`, {
    method:'DELETE',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ authorName: currentUser() })
  });
  fetchMessages();
}

document.getElementById('sendBtn').onclick = sendMessage;
document.getElementById('messageInput').addEventListener('keydown', e => { if(e.key === 'Enter') sendMessage(); });
document.getElementById('refreshBtn').onclick = fetchMessages;

// --- Poll modal ---
const pollModal = document.getElementById('pollModal');
const pollOptionsWrap = document.getElementById('pollOptionsWrap');

function addOptionField(value=''){
  const wrap = document.createElement('div');
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.placeholder = 'Option';
  inp.value = value;
  inp.className = 'poll-option-input';
  wrap.appendChild(inp);
  pollOptionsWrap.appendChild(wrap);
}

document.getElementById('pollBtn').onclick = () => {
  pollOptionsWrap.innerHTML = '';
  document.getElementById('pollQuestion').value = '';
  addOptionField(); addOptionField();
  pollModal.classList.add('open');
};
document.getElementById('cancelPoll').onclick = () => pollModal.classList.remove('open');
document.getElementById('addOptionBtn').onclick = (e) => {
  e.preventDefault();
  const count = pollOptionsWrap.querySelectorAll('input').length;
  if(count < 10) addOptionField();
};

document.getElementById('createPoll').onclick = async () => {
  const question = document.getElementById('pollQuestion').value.trim();
  const options = [...pollOptionsWrap.querySelectorAll('input')].map(i => i.value.trim()).filter(Boolean);
  if(!question || options.length < 2){
    alert('Une question et au moins 2 options sont requises.');
    return;
  }
  await fetch(`${API_BASE}/chat/polls`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ authorName: currentUser(), question, options })
  });
  pollModal.classList.remove('open');
  fetchMessages();
};

// --- Auto-refresh every 5s ---
let intervalId = null;
function setupAutoRefresh(){
  const enabled = document.getElementById('autoRefreshToggle').checked;
  if(intervalId) clearInterval(intervalId);
  if(enabled) intervalId = setInterval(fetchMessages, 5000);
}
document.getElementById('autoRefreshToggle').addEventListener('change', setupAutoRefresh);

fetchMessages();
setupAutoRefresh();
</script>
</body>
</html>
